<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEADLOCK SCAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-[#0f0] p-6 font-mono">
    <div class="border-2 border-[#0f0] rounded-3xl p-6 shadow-[0_0_20px_#0f0] bg-zinc-950 text-center">
        <h1 class="text-2xl font-black mb-6 uppercase italic underline">Deadlock v1.0</h1>
        <div class="bg-black p-4 rounded-xl mb-8 border border-zinc-800">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Router IP:</p>
            <p id="ip" class="text-2xl font-bold">---.---.---.---</p>
        </div>
        <button onclick="document.getElementById('ip').innerText='192.168.1.1'" class="w-full py-6 bg-[#0f0] text-black font-black rounded-2xl mb-4 text-xl active:scale-95 uppercase shadow-[0_5px_0_#080]">Сканувати</button>
        <button onclick="navigator.share({title:'Deadlock', url:window.location.href})" class="w-full py-4 border-2 border-blue-500 text-blue-500 font-bold rounded-2xl uppercase text-[10px]">🔵 Передати брату</button>
    </div>
</body>
</html>
