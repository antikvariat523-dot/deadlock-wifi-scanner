<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>DEADLOCK</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 5px solid #0f0; border-radius: 40px; padding: 40px; box-shadow: 0 0 20px #0f0; width: 85%; background: #0a0a0a; }
        .res { font-size: 32px; margin: 20px 0; color: #fff; font-weight: bold; border: 2px solid #333; padding: 20px; border-radius: 15px; }
        button { width: 100%; padding: 25px; background: #0f0; color: #000; font-weight: 900; font-size: 24px; border: none; border-radius: 20px; text-transform: uppercase; box-shadow: 0 6px 0 #050; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #050; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-style: italic;">DEADLOCK V1.0</h1>
        <div class="res" id="out">---.---.---.---</div>
        <button onclick="document.getElementById('out').innerText='192.168.1.1'">СКАНУВАТИ</button>
    </div>
</body>
</html>
