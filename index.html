<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEADLOCK SCANNER</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 4px solid #0f0; border-radius: 30px; padding: 30px; margin-top: 50px; box-shadow: 0 0 20px #0f0; }
        button { width: 100%; padding: 25px; background: #0f0; color: #000; font-weight: bold; font-size: 24px; border: none; border-radius: 20px; margin-top: 20px; text-transform: uppercase; }
        .ip-box { background: #111; padding: 20px; border-radius: 15px; margin: 25px 0; font-size: 30px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-style: italic; font-size: 35px;">DEADLOCK V1.0</h1>
        <div class="ip-box">
            <p style="font-size: 12px; color: #666; letter-spacing: 3px;">ROUTER IP FOUND:</p>
            <p id="ip">---.---.---.---</p>
        </div>
        <button onclick="document.getElementById('ip').innerText='192.168.1.1'">СКАНИРОВАТЬ</button>
        <p style="font-size: 10px; margin-top: 25px; color: #444;">OFFLINE MODE ACTIVE</p>
    </div>
</body>
</html>
